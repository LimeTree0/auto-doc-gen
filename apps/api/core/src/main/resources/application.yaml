spring:
  application:
    name: core
  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY:}
        chat:
          options:
            model: ${GEMINI_CHAT_MODEL:gemini-2.5-flash}
        embedding:
          text:
            options:
              model: ${GEMINI_EMBEDDING_MODEL:gemini-embedding-001}
              dimensions: 1536
          api-key: ${GEMINI_API_KEY:}
          location: ${GEMINI_EMBEDDING_LOCATION:us-central1}
          vertex-ai: false
    vectorstore:
      pgvector:
        initialize-schema: true
        index-type: HNSW
        distance-type: COSINE_DISTANCE
        dimensions: 1536
        table-name: source_chunk_embeddings
        schema-name: public
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

gemini:
  api-key: ${GEMINI_API_KEY:}
  model: ${GEMINI_MODEL:gemini-2.5-flash}
  base-url: ${GEMINI_BASE_URL:https://generativelanguage.googleapis.com/v1beta}

documents:
  api:
    base-url: ${DOCUMENTS_API_BASE_URL:http://localhost:8081}

---
spring:
  datasource:
    url: ${POSTGRES_URL:jdbc:postgresql://localhost:5432/autodocgen}
    username: ${POSTGRES_USER:autodocgen}
    password: ${POSTGRES_PASSWORD:autodocgen}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
    open-in-view: false
