services:
  postgres:
    image: postgres:16
    container_name: auto-doc-gen-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-autodocgen}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-autodocgen}
      POSTGRES_DB: ${POSTGRES_DB:-autodocgen}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-autodocgen} -d ${POSTGRES_DB:-autodocgen}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data: